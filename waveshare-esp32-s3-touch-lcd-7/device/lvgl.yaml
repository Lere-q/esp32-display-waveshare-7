lvgl:
  top_layer:
    widgets:
      # Clock
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 30
      pad_bottom: 5
      pad_left: 5
      pad_right: 5
      
      widgets:
        # Test Button - Large Centered Button
        - button: 
            width: 300px
            height: 309px
            align: center
            id: test_button
            styles: control
            checkable: true
            widgets:
              - label:
                  text_font: $text_font
                  align: center
                  id: test_button_label
                  text: "Test"
            on_press:
              - homeassistant.service:
                  service: notify.notify
                  data:
                    message: "Button gedrückt!"
                    title: "ESP32 Display"
