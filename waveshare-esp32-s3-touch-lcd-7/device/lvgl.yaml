lvgl:
  displays:
    - my_display_id # Ersetze dies mit deiner Display-ID
  
  # Farben für ein "Polished" Aussehen
  bg_color: 0x1E1E1E # Dunkler Hintergrund
  text_color: 0xFFFFFF

  # --- POPUP (Top Layer liegt über allem) ---
  top_layer:
    widgets:
      - obj:
          id: wifi_popup
          width: 300
          height: 200
          align: CENTER
          bg_color: 0x333333
          radius: 10
          hidden: true
          layout:
            type: FLEX
            flex_flow: COLUMN
            flex_align_main: SPACE_EVENLY
            flex_align_cross: CENTER
          widgets:
            - label:
                text: "WLAN Status"
                text_font: font_large
            - label:
                id: popup_ssid_label
                text: "SSID: Lade..."
            - label:
                id: popup_ip_label
                text: "IP: Lade..."
            - switch:
                id: wifi_toggle_dummy
                # Dummy Schalter, siehe Hinweise
            - button:
                widgets:
                  - label:
                      text: "Schließen"
                on_click:
                  - lvgl.widget.hide: wifi_popup

  widgets:
    # --- 1. KOPFZEILE (Immer oben) ---
    - obj:
        id: top_bar
        width: 100%
        height: 50
        align: TOP_MID
        bg_color: 0x2C2C2C
        radius: 0
        border_width: 0
        widgets:
          - label:
              id: time_label
              text: "00:00"
              text_font: font_large
              align: LEFT_MID
              x: 15
          - button:
              align: RIGHT_MID
              x: -15
              bg_color: 0x2C2C2C # Unsichtbarer Hintergrund
              widgets:
                - label:
                    text: "\uf1eb" # FontAwesome WiFi Icon
                    text_font: font_icons
                    text_color: 0x4CAF50 # Grün wenn verbunden
              on_click:
                # Öffnet das Popup und aktualisiert die Texte
                - lambda: |-
                    id(popup_ssid_label).set_text(id(display_ssid).state.c_str());
                    id(popup_ip_label).set_text(id(display_ip).state.c_str());
                - lvgl.widget.show: wifi_popup

    # --- 2. HAUPTBEREICH MIT NAVIGATION UNTEN ---
    - tabview:
        id: main_tabs
        width: 100%
        height: 430 # Gesamt (480) - TopBar (50)
        y: 50 # Startet direkt unter der TopBar
        tab_bar_placement: BOTTOM
        
        tabs:
          # --- SEITE 1: ENERGY FLOW (Statisch/Fake) ---
          - tab:
              name: "\uf0e7 Energie"
              widgets:
                - obj:
                    width: 100%
                    height: 100%
                    bg_color: 0x1E1E1E
                    border_width: 0
                    # Fake Flow Diagramm (Zentriertes Haus, außen Quellen)
                    widgets:
                      - label: { text: "Solar: 2.5 kW", align: TOP_MID, y: 20, text_color: 0xFFC107 }
                      - label: { text: "Netz: 0.0 kW", align: LEFT_MID, x: 20, text_color: 0xF44336 }
                      - label: { text: "Akku: 85%", align: RIGHT_MID, x: -20, text_color: 0x4CAF50 }
                      # Das "Haus" im Zentrum
                      - obj:
                          width: 120
                          height: 120
                          align: CENTER
                          bg_color: 0x333333
                          radius: 60 # Kreis
                          layout: { type: FLEX, flex_flow: COLUMN, flex_align_main: CENTER, flex_align_cross: CENTER }
                          widgets:
                            - label: { text: "\uf015", text_font: font_large } # Haus Icon
                            - label: { text: "1.8 kW" }

          # --- SEITE 2: ROLLOS & FENSTER ---
          - tab:
              name: "\uf853 Rollos"
              widgets:
                - obj:
                    width: 100%
                    height: 100%
                    bg_color: 0x1E1E1E
                    border_width: 0
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_main: SPACE_EVENLY
                    widgets:
                      # Linke Spalte: Rollos (Hier exemplarisch Rollo 1 & 2)
                      - obj:
                          width: 45%
                          height: 100%
                          layout: { type: FLEX, flex_flow: COLUMN, pad_all: 10 }
                          widgets:
                            - label: { text: "Rollos", text_font: font_large, pad_bottom: 20 }
                            # Rollo 1
                            - obj:
                                width: 100%
                                height: 60
                                layout: { type: FLEX, flex_flow: ROW, flex_align_main: SPACE_BETWEEN, flex_align_cross: CENTER }
                                widgets:
                                  - label: { text: "Wohnzimmer" }
                                  - button: { widgets: [ label: { text: "\uf077" } ] } # Hoch
                                  - button: { widgets: [ label: { text: "\uf04d" } ] } # Stop
                                  - button: { widgets: [ label: { text: "\uf078" } ] } # Runter
                            # Rollo 2 (Dupliziere diesen Block für weitere Rollos)
                            - obj:
                                width: 100%
                                height: 60
                                layout: { type: FLEX, flex_flow: ROW, flex_align_main: SPACE_BETWEEN, flex_align_cross: CENTER }
                                widgets:
                                  - label: { text: "Schlafzimmer" }
                                  - button: { widgets: [ label: { text: "\uf077" } ] }
                                  - button: { widgets: [ label: { text: "\uf04d" } ] }
                                  - button: { widgets: [ label: { text: "\uf078" } ] }

                      # Rechte Spalte: Fenster
                      - obj:
                          width: 45%
                          height: 100%
                          layout: { type: FLEX, flex_flow: COLUMN, pad_all: 10 }
                          widgets:
                            - label: { text: "Fenster", text_font: font_large, pad_bottom: 20 }
                            - obj:
                                width: 100%
                                layout: { type: FLEX, flex_flow: ROW, flex_align_main: SPACE_BETWEEN }
                                widgets:
                                  - label: { text: "Schlafzimmer:" }
                                  - label: { text: "Zu", text_color: 0x4CAF50 } # Grün
                            - obj:
                                width: 100%
                                layout: { type: FLEX, flex_flow: ROW, flex_align_main: SPACE_BETWEEN }
                                widgets:
                                  - label: { text: "Bad:" }
                                  - label: { text: "Offen", text_color: 0xF44336 } # Rot

          # --- SEITE 3: EINSTELLUNGEN ---
          - tab:
              name: "\uf013 Setup"
              widgets:
                - obj:
                    width: 100%
                    height: 100%
                    bg_color: 0x1E1E1E
                    border_width: 0
                    layout: { type: FLEX, flex_flow: COLUMN, pad_all: 20 }
                    widgets:
                      - label: { text: "Helligkeit", pad_bottom: 10 }
                      - slider:
                          width: 80%
                          min_value: 10
                          max_value: 100
                          value: 80
                      - label: { text: "Display Timeout", pad_top: 30, pad_bottom: 10 }
                      - dropdown:
                          options: "1 Min\n5 Min\nImmer an"

