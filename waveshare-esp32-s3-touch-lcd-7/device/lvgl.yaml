lvgl:
  top_layer:
    widgets:
      # Clock
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
      # WiFi Indicator
      - label:
          text: $wifi  # WiFi icon from mdi
          id: wifi_indicator
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF
          on_press:
            - lambda: |-
                id(wifi_popup).hidden = !id(wifi_popup).hidden;
      # WiFi Popup
      - obj:
          id: wifi_popup
          hidden: true
          align: center
          width: 400px
          height: 200px
          bg_color: 0x313131
          bg_opa: cover
          radius: 12px
          widgets:
            - label:
                text: "WiFi Information"
                align: top_mid
                y: 10
                text_color: 0xFFFFFF
                text_font: roboto17_font
            - label:
                text: "SSID: --"
                id: popup_ssid
                align: top_mid
                y: 40
                text_color: 0xFFFFFF
                text_font: roboto17_font
            - label:
                text: "IP: --"
                id: popup_ip
                align: top_mid
                y: 70
                text_color: 0xFFFFFF
                text_font: roboto17_font
            - label:
                text: "Press to toggle WiFi"
                align: bottom_mid
                y: -10
                text_color: 0xFF8C00
                text_font: roboto15_font
            - button:
                align: bottom_mid
                width: 100px
                height: 40px
                y: 30
                text: "Toggle"
                id: wifi_toggle_button
                styles: control
                on_press:
                  - homeassistant.service:
                      service: persistent_notification.create
                      data:
                        title: "WiFi Toggle"
                        message: "Button pressed"
  pages:
    - id: main_page
      layout: 
        type: flex
        flex_flow: column_wrap
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 30
      pad_bottom: 5
      pad_left: 5
      pad_right: 5